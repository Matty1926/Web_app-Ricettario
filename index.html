<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ricettario MP">
<meta name="theme-color" content="#1a1209">
<title>Il ricettario di MP</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede5d0;
    --ink: #1a1209;
    --ink-light: #3d2e1a;
    --terra: #8b3a1a;
    --terra-light: #c4622e;
    --sage: #5a7a50;
    --sage-light: #8aab7e;
    --gold: #c49a2e;
    --gold-light: #e8c46a;
    --paper: #faf7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Lora', Georgia, serif;
    background: var(--ink); color: var(--ink);
  }

  #app {
    height: 100dvh; display: flex; flex-direction: column;
    background: var(--paper); max-width: 430px; margin: 0 auto;
    position: relative; overflow: hidden;
  }

  /* --- SCHERMI --- */
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateX(30px);
  }
  .screen.active { opacity: 1; pointer-events: all; transform: translateX(0); }

  /* --- HOME --- */
  #screen-home { background: var(--ink); overflow-y: auto; padding-bottom: 120px; }
  .home-header { padding: calc(var(--safe-top) + 20px) 24px 0; }
  .home-title { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--cream); line-height: 1.1; }
  .home-title em { font-style: italic; color: var(--gold-light); }
  
  .search-filter-row { margin: 20px 24px; position: sticky; top: 10px; z-index: 10; }
  .search-bar input {
    width: 100%; padding: 15px 20px; background: rgba(245,240,232,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(245,240,232,0.15); border-radius: 20px; color: var(--cream);
    font-family: 'Lora', serif; font-size: 16px; outline: none;
  }
  .search-bar input::placeholder { color: rgba(245,240,232,0.5); }

  .recipes-container { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .recipe-card {
    background: rgba(245,240,232,0.06); border: 1px solid rgba(245,240,232,0.1);
    border-radius: 18px; overflow: hidden; cursor: pointer; position: relative;
    transition: transform 0.2s;
  }
  .recipe-card:active { transform: scale(0.96); }
  .recipe-card-emoji { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 50px; background: rgba(245,240,232,0.04); position: relative; }
  .recipe-card-img { width: 100%; height: 100%; object-fit: cover; }
  .recipe-card-fav { position: absolute; top: 10px; right: 10px; font-size: 18px; z-index: 2; }
  .recipe-card-body { padding: 12px; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--cream); line-height: 1.2; margin-bottom: 6px; height: 38px; overflow: hidden; }
  .recipe-card-meta { font-size: 12px; color: rgba(245,240,232,0.5); display: flex; justify-content: space-between; }

  /* --- DETTAGLIO --- */
  #screen-detail { background: var(--paper); overflow-y: auto; padding-bottom: 100px; }
  .detail-hero { height: 280px; background: var(--ink); display: flex; align-items: center; justify-content: center; position: relative; font-size: 90px; overflow: hidden; }
  .detail-hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
  .detail-back { position: absolute; top: calc(var(--safe-top) + 20px); left: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(26,18,9,0.6); backdrop-filter: blur(10px); color: var(--cream); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; z-index: 10; border: 1px solid rgba(245,240,232,0.2); }
  .detail-top-right { position: absolute; top: calc(var(--safe-top) + 20px); right: 20px; display: flex; gap: 10px; z-index: 10; }
  .detail-icon-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(26,18,9,0.6); backdrop-filter: blur(10px); color: var(--cream); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border: 1px solid rgba(245,240,232,0.2); }
  
  .detail-content { padding: 24px; }
  .detail-cat { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--terra); margin-bottom: 8px; font-weight: 600; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 34px; line-height: 1.1; margin-bottom: 20px; color: var(--ink); }
  
  .portions-bar { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border-radius: 14px; padding: 12px 20px; margin-bottom: 20px; }
  .portions-controls { display: flex; align-items: center; gap: 15px; }
  .portions-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--cream-dark); background: var(--paper); font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .portions-num { font-family: 'Playfair Display', serif; font-size: 24px; min-width: 30px; text-align: center; }

  .timer-bar { display: flex; align-items: center; gap: 15px; background: var(--ink); border-radius: 14px; padding: 15px 20px; margin-bottom: 25px; }
  .timer-display { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--cream); flex: 1; letter-spacing: 1px; }
  .timer-ctrl-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--sage); background: rgba(90,122,80,0.2); color: var(--sage-light); font-family: 'Lora', serif; font-weight: 600; cursor: pointer; font-size: 14px; }

  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; margin-bottom: 15px; margin-top: 10px; }
  
  .ingredient-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--cream-dark); gap: 12px; font-size: 16px; }
  .ingredient-bullet { width: 8px; height: 8px; border-radius: 50%; background: var(--terra); flex-shrink: 0; }
  .ingredient-name { flex: 1; }
  .ingredient-qty { color: var(--ink-light); font-weight: 600; }

  .step-item { display: flex; gap: 15px; margin-bottom: 25px; }
  .step-num { width: 30px; height: 30px; border-radius: 50%; background: var(--ink); color: var(--cream); font-family: 'Playfair Display', serif; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step-text { font-size: 16px; line-height: 1.6; color: var(--ink-light); }

  .note-textarea { width: 100%; min-height: 100px; padding: 15px; background: var(--cream); border: 1.5px solid var(--cream-dark); border-radius: 14px; font-family: inherit; font-size: 15px; resize: none; outline: none; margin-bottom: 10px; }
  .btn-primary { width: 100%; padding: 16px; border-radius: 14px; background: var(--ink); color: var(--cream); font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; border: none; cursor: pointer; margin-top: 10px; }
  .btn-danger { width: 100%; padding: 16px; border-radius: 14px; background: transparent; color: #c0392b; border: 1.5px solid #c0392b; font-family: 'Lora', serif; font-size: 16px; cursor: pointer; margin-top: 30px; }

  /* --- MODALITÀ CUCINA --- */
  #screen-cooking { background: var(--ink); color: var(--cream); z-index: 50; }
  .cook-header { padding: calc(var(--safe-top) + 20px) 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .cook-step-card { margin: 40px 20px; background: rgba(245,240,232,0.05); border: 1px solid rgba(245,240,232,0.1); border-radius: 24px; padding: 40px 30px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
  .cook-step-num { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,240,232,0.4); margin-bottom: 20px; }
  .cook-text { font-family: 'Playfair Display', serif; font-size: 26px; line-height: 1.5; }
  .cook-nav { display: flex; gap: 15px; padding: 0 20px; position: absolute; bottom: 50px; width: 100%; }
  .cook-nav button { flex: 1; padding: 18px; border-radius: 16px; font-family: 'Lora', serif; font-size: 16px; cursor: pointer; border: none; }
  .cook-prev { background: rgba(245,240,232,0.1); color: var(--cream); }
  .cook-next { background: var(--terra); color: var(--cream); font-weight: 600; }

  /* --- FORM ADD/EDIT --- */
  #screen-add { background: var(--paper); overflow-y: auto; padding-bottom: 100px; }
  .add-header { padding: calc(var(--safe-top) + 20px) 24px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--paper); position: sticky; top: 0; z-index: 10; }
  .form-group { padding: 0 24px; margin-bottom: 20px; }
  .form-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(26,18,9,0.5); margin-bottom: 8px; display: block; }
  .form-input, .form-select { width: 100%; padding: 15px; background: var(--cream); border: 1.5px solid var(--cream-dark); border-radius: 12px; font-family: inherit; font-size: 16px; outline: none; }
  
  #image-preview-container { width: 100%; height: 180px; background: var(--cream-dark); border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 1.5px dashed var(--ink-light); }
  #image-preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
  
  .emoji-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .emoji-opt { font-size: 28px; text-align: center; cursor: pointer; padding: 5px; border-radius: 10px; border: 2px solid transparent; }
  .emoji-opt.sel { background: var(--cream-dark); border-color: var(--terra); }

  .ing-row, .step-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .ing-row input { flex: 1; }
  .ing-row input.qty { max-width: 100px; }
  .remove-btn { width: 45px; border-radius: 12px; background: var(--cream-dark); border: none; font-size: 20px; color: var(--ink); cursor: pointer; }
  .add-row-btn { width: 100%; padding: 12px; border: 1.5px dashed var(--cream-dark); background: transparent; border-radius: 12px; color: var(--terra); font-family: inherit; font-size: 15px; cursor: pointer; margin-top: 5px; }

  /* --- NAV & FAB --- */
  .bottom-nav {
    position: absolute; bottom: 0; width: 100%; height: calc(75px + var(--safe-bottom));
    background: rgba(26,18,9,0.98); backdrop-filter: blur(10px);
    display: flex; justify-content: space-around; padding-top: 10px; z-index: 100;
  }
  .nav-item { color: rgba(245,240,232,0.4); text-align: center; font-size: 11px; font-family: inherit; letter-spacing: 0.5px; cursor: pointer; }
  .nav-item.active { color: var(--terra-light); }
  .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

  .fab {
    position: absolute; bottom: calc(90px + var(--safe-bottom)); right: 24px; width: 60px; height: 60px;
    border-radius: 50%; background: var(--terra); color: var(--cream);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    box-shadow: 0 6px 20px rgba(139,58,26,0.4); cursor: pointer; z-index: 90;
  }

  /* --- BACKUP SECTION --- */
  .backup-section { margin: 40px 24px; padding: 20px; background: rgba(245,240,232,0.05); border: 1px solid rgba(245,240,232,0.1); border-radius: 16px; text-align: center; }
  .backup-btn { padding: 10px 15px; background: transparent; border: 1px solid rgba(245,240,232,0.3); color: var(--cream); border-radius: 8px; font-family: inherit; font-size: 13px; margin: 5px; cursor: pointer; }

  #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); padding: 12px 25px; border-radius: 30px; font-size: 14px; z-index: 3000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); white-space: nowrap; }
</style>
</head>
<body>

<div id="app">
  
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="home-title">Il ricettario<br><em>di MP</em></div>
    </div>
    <div class="search-filter-row">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cerca ricette o ingredienti..." oninput="renderRecipes()">
      </div>
    </div>
    
    <div id="main-grid" class="recipes-container"></div>

    <div class="backup-section">
      <div style="font-size: 12px; color: rgba(245,240,232,0.5); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Archivio Dati</div>
      <button class="backup-btn" onclick="exportBackup()">📤 Esporta</button>
      <button class="backup-btn" onclick="document.getElementById('import-input').click()">📥 Importa</button>
      <input type="file" id="import-input" style="display:none" accept=".json" onchange="importBackup(this)">
    </div>
  </div>

  <div class="screen" id="screen-detail">
    <div id="detail-hero" class="detail-hero"></div>
    <div class="detail-back" onclick="showScreen('home')">←</div>
    <div class="detail-top-right">
      <div class="detail-icon-btn" onclick="editRecipe()">✏️</div>
      <div class="detail-icon-btn" id="detail-fav-btn" onclick="toggleFavDetail()">🤍</div>
    </div>

    <div class="detail-content">
      <div id="detail-cat" class="detail-cat"></div>
      <h1 id="detail-name" class="detail-name"></h1>
      
      <div class="portions-bar">
        <span style="font-size: 14px; color: var(--ink-light); font-weight: 500;">👥 Porzioni</span>
        <div class="portions-controls">
          <button class="portions-btn" onclick="updatePortions(-1)">−</button>
          <div class="portions-num" id="current-portions">4</div>
          <button class="portions-btn" onclick="updatePortions(1)">+</button>
        </div>
      </div>

      <div id="timer-container" class="timer-bar" style="display:none">
        <div id="timer-display" class="timer-display">00:00</div>
        <button class="timer-ctrl-btn" id="timer-control" onclick="toggleTimer()">Avvia Timer</button>
      </div>

      <div class="section-title">Ingredienti</div>
      <div id="detail-ingredients"></div>

      <div class="section-title" style="margin-top: 30px;">Procedimento</div>
      <div id="detail-steps"></div>

      <div class="section-title" style="margin-top: 30px;">Note Personali</div>
      <textarea id="detail-notes" class="note-textarea" placeholder="Scrivi varianti, trucchi o appunti qui..."></textarea>
      <button class="btn-primary" onclick="saveNotes()" style="margin-top: 0; padding: 12px; font-size: 16px;">Salva Nota</button>
      
      <button class="btn-primary" onclick="startCooking()" style="background: var(--sage); margin-top: 30px;">👨‍🍳 Inizia a Cucinare</button>
      <button class="btn-danger" onclick="deleteCurrent()">🗑 Elimina Ricetta</button>
    </div>
  </div>

  <div class="screen" id="screen-cooking">
    <div class="cook-header">
      <div style="font-family:'Playfair Display', serif; font-size:20px; font-style:italic;" id="cook-recipe-name"></div>
      <div onclick="closeCookingMode()" style="font-size:24px; cursor:pointer;">✕</div>
    </div>
    
    <div class="cook-step-card">
      <div id="cook-step-indicator" class="cook-step-num">Passaggio 1</div>
      <div id="cook-text" class="cook-text"></div>
    </div>
    
    <div class="cook-nav">
      <button class="cook-prev" id="cook-prev" onclick="changeCookStep(-1)">Indietro</button>
      <button class="cook-next" id="cook-next" onclick="changeCookStep(1)">Avanti</button>
    </div>
  </div>

  <div class="screen" id="screen-add">
    <div class="add-header">
      <h2 id="add-title" style="font-family:'Playfair Display', serif; font-size: 26px;">Nuova Ricetta</h2>
      <div onclick="showScreen('home')" style="font-size: 24px; cursor:pointer;">✕</div>
    </div>

    <div class="form-group">
      <div class="form-label">Foto Ricetta</div>
      <div id="image-preview-container">
        <span id="preview-placeholder" style="color:var(--ink-light); opacity:0.5; font-size:14px;">Tocca per caricare una foto</span>
        <img id="image-preview-img">
        <input type="file" id="new-image-input" accept="image/*" style="position:absolute; inset:0; opacity:0; cursor:pointer;" onchange="handleImageUpload(this)">
      </div>
      <button id="remove-img-btn" onclick="removePhoto()" style="display:none; width:100%; padding:10px; margin-top:8px; border-radius:10px; border:1px solid #c0392b; background:transparent; color:#c0392b;">Rimuovi foto</button>
    </div>

    <div class="form-group">
      <div class="form-label">Emoji</div>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="form-group">
      <div class="form-label">Nome</div>
      <input type="text" id="new-name" class="form-input" placeholder="Es. Tiramisù Classico">
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
      <div style="flex:1">
        <div class="form-label">Categoria</div>
        <select id="new-category" class="form-select">
          <option value="Primo">Primo</option>
          <option value="Secondo">Secondo</option>
          <option value="Antipasto">Antipasto</option>
          <option value="Dolce">Dolce</option>
          <option value="Altro">Altro</option>
        </select>
      </div>
      <div style="flex:1">
        <div class="form-label">Minuti</div>
        <input type="number" id="new-time" class="form-input" value="30">
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">Ingredienti</div>
      <div id="ingredients-builder"></div>
      <button class="add-row-btn" onclick="addIngredientRow()">+ Aggiungi Ingrediente</button>
    </div>

    <div class="form-group">
      <div class="form-label">Procedimento</div>
      <div id="steps-builder"></div>
      <button class="add-row-btn" onclick="addStepRow()">+ Aggiungi Passaggio</button>
    </div>

    <div class="form-group" style="margin-top: 30px;">
      <button class="btn-primary" onclick="saveRecipe()">Salva Ricetta</button>
    </div>
  </div>

  <div class="fab" id="fab-btn" onclick="prepareNewRecipe()">+</div>
  
  <nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="showScreen('home')">
      <span class="nav-icon">🏠</span>Home
    </div>
    <div class="nav-item" id="nav-favs" onclick="filterFavs()">
      <span class="nav-icon">❤️</span>Preferiti
    </div>
  </nav>

  <div id="toast"></div>

</div>

<script>
  // DATI E STATO
  const EMOJIS = ['🍝','🍕','🥩','🥗','🍰','🍪','☕️','🥐','🌮','🍜','🥘','🍔','🍎','🥑','🥦','🥣','🥓','🍣'];
  let recipes = JSON.parse(localStorage.getItem('ricettario_mp_data')) || [];
  let currentRecipe = null;
  let editingId = null;
  let currentImage = null;
  let selectedEmoji = '🍝';
  let showFavoritesOnly = false;

  // VARIABILI PORZIONI E TIMER
  let currentPortions = 4;
  let timerInt = null;
  let timeLeft = 0;
  let cookStep = 0;

  function init() {
    setupEmojiPicker();
    renderRecipes();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  function save() {
    localStorage.setItem('ricettario_mp_data', JSON.stringify(recipes));
    renderRecipes();
  }

  // NAVIGAZIONE
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    
    // Gestione visibilità Nav e FAB
    const isMain = (id === 'home');
    document.getElementById('bottom-nav').style.display = isMain ? 'flex' : 'none';
    document.getElementById('fab-btn').style.display = isMain ? 'flex' : 'none';
    
    if(id === 'home') {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(showFavoritesOnly ? 'nav-favs' : 'nav-home').classList.add('active');
    }
  }

  // EMOJI E FOTO
  function setupEmojiPicker() {
    const p = document.getElementById('emoji-picker');
    p.innerHTML = EMOJIS.map(e => `<div class="emoji-opt ${e===selectedEmoji?'sel':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
  }
  
  function selectEmoji(e) {
    selectedEmoji = e;
    document.querySelectorAll('.emoji-opt').forEach(el => {
      el.classList.toggle('sel', el.textContent === e);
    });
  }

  function handleImageUpload(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height, max = 800;
        if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        currentImage = canvas.toDataURL('image/jpeg', 0.7);
        displayPreview(currentImage);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function displayPreview(src) {
    const img = document.getElementById('image-preview-img');
    img.src = src || ''; img.style.display = src ? 'block' : 'none';
    document.getElementById('preview-placeholder').style.display = src ? 'none' : 'block';
    document.getElementById('remove-img-btn').style.display = src ? 'block' : 'none';
  }

  function removePhoto() { currentImage = null; displayPreview(null); document.getElementById('new-image-input').value = ''; }

  // HOME E RENDER
  function filterFavs() {
    showFavoritesOnly = !showFavoritesOnly;
    renderRecipes();
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(showFavoritesOnly ? 'nav-favs' : 'nav-home').classList.add('active');
  }

  function renderRecipes() {
    const grid = document.getElementById('main-grid');
    const q = document.getElementById('search-input').value.toLowerCase();
    
    let filtered = recipes.filter(r => r.name.toLowerCase().includes(q) || r.category.toLowerCase().includes(q));
    if(showFavoritesOnly) filtered = filtered.filter(r => r.fav);

    if(filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:rgba(245,240,232,0.4); font-style:italic;">Nessuna ricetta trovata.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(r => `
      <div class="recipe-card" onclick="openRecipe(${r.id})">
        <div class="recipe-card-fav" onclick="event.stopPropagation(); toggleFav(${r.id})">${r.fav ? '❤️' : '🤍'}</div>
        <div class="recipe-card-emoji">
          ${r.image ? `<img src="${r.image}" class="recipe-card-img">` : r.emoji}
        </div>
        <div class="recipe-card-body">
          <div class="recipe-card-name">${r.name}</div>
          <div class="recipe-card-meta">
            <span>⏱ ${r.time}m</span>
            <span>${r.category}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleFav(id) { const r = recipes.find(x => x.id === id); r.fav = !r.fav; save(); }

  // DETTAGLIO RICETTA
  function openRecipe(id) {
    currentRecipe = recipes.find(r => r.id === id);
    currentPortions = currentRecipe.portions || 4;
    showScreen('detail');
    
    const hero = document.getElementById('detail-hero');
    if(currentRecipe.image) {
      hero.innerHTML = `<img src="${currentRecipe.image}" class="detail-hero-img"> <span style="z-index:1; font-size:60px;">${currentRecipe.emoji}</span>`;
    } else {
      hero.innerHTML = currentRecipe.emoji;
    }

    document.getElementById('detail-cat').textContent = currentRecipe.category;
    document.getElementById('detail-name').textContent = currentRecipe.name;
    document.getElementById('detail-fav-btn').textContent = currentRecipe.fav ? '❤️' : '🤍';
    document.getElementById('detail-notes').value = currentRecipe.notes || '';
    
    updatePortionsDisplay();

    document.getElementById('detail-steps').innerHTML = currentRecipe.steps.map((s,i) => `
      <div class="step-item">
        <div class="step-num">${i+1}</div>
        <div class="step-text">${s}</div>
      </div>
    `).join('');

    // Rileva timer generico nel testo
    const allText = currentRecipe.steps.join(' ');
    const m = allText.match(/(\d+)\s*(minuti|min|m\b)/i);
    if(m) {
      timeLeft = parseInt(m[1]) * 60;
      document.getElementById('timer-container').style.display = 'flex';
      updateTimerDisp();
    } else {
      document.getElementById('timer-container').style.display = 'none';
    }
  }

  function toggleFavDetail() { currentRecipe.fav = !currentRecipe.fav; save(); document.getElementById('detail-fav-btn').textContent = currentRecipe.fav ? '❤️' : '🤍'; }
  function saveNotes() { currentRecipe.notes = document.getElementById('detail-notes').value; save(); toast('📝 Note salvate'); }
  function deleteCurrent() { if(confirm('Eliminare definitivamente?')) { recipes = recipes.filter(r => r.id !== currentRecipe.id); save(); showScreen('home'); } }

  // PORZIONI
  function updatePortions(delta) {
    if(currentPortions + delta < 1) return;
    currentPortions += delta;
    updatePortionsDisplay();
  }

  function updatePortionsDisplay() {
    document.getElementById('current-portions').textContent = currentPortions;
    const ratio = currentPortions / (currentRecipe.portions || 4);
    
    document.getElementById('detail-ingredients').innerHTML = currentRecipe.ingredients.map(ing => {
      let q = ing.qty;
      if(ing.baseQty) q = (ing.baseQty * ratio).toFixed(ing.baseQty*ratio % 1 === 0 ? 0 : 1) + ' ' + ing.unit;
      return `<div class="ingredient-item"><span class="ingredient-bullet"></span><span class="ingredient-name">${ing.name}</span><span class="ingredient-qty">${q}</span></div>`;
    }).join('');
  }

  // TIMER
  function updateTimerDisp() {
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timer-display').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }

  function toggleTimer() {
    const btn = document.getElementById('timer-control');
    if(timerInt) { 
      clearInterval(timerInt); timerInt=null; btn.textContent = "Riprendi";
    } else { 
      btn.textContent = "Pausa";
      timerInt = setInterval(() => { 
        timeLeft--; updateTimerDisp(); 
        if(timeLeft<=0){ clearInterval(timerInt); timerInt=null; alert("⏰ Tempo scaduto!"); btn.textContent = "Avvia Timer"; }
      }, 1000); 
    }
  }

  // MODALITÀ CUCINA
  function startCooking() { 
    cookStep = 0; 
    document.getElementById('cook-recipe-name').textContent = currentRecipe.name;
    document.getElementById('screen-cooking').classList.add('active');
    updateCookUI(); 
  }

  function closeCookingMode() { 
    document.getElementById('screen-cooking').classList.remove('active'); 
  }

  function changeCookStep(d) {
    if(cookStep+d >= 0 && cookStep+d < currentRecipe.steps.length) { cookStep += d; updateCookUI(); }
    else if(cookStep+d >= currentRecipe.steps.length) { closeCookingMode(); toast("🎉 Ricetta completata!"); }
  }

  function updateCookUI() {
    document.getElementById('cook-text').textContent = currentRecipe.steps[cookStep];
    document.getElementById('cook-step-indicator').textContent = `Passaggio ${cookStep+1} di ${currentRecipe.steps.length}`;
    document.getElementById('cook-prev').style.opacity = cookStep === 0 ? '0.3' : '1';
    document.getElementById('cook-next').textContent = cookStep === currentRecipe.steps.length - 1 ? 'Fine' : 'Avanti';
  }

  // AGGIUNTA / MODIFICA RICETTA
  let ingCount = 0, stepCount = 0;
  
  function prepareNewRecipe() {
    editingId = null; currentImage = null; displayPreview(null);
    document.getElementById('add-title').textContent = "Nuova Ricetta";
    document.getElementById('new-name').value = '';
    document.getElementById('ingredients-builder').innerHTML = '';
    document.getElementById('steps-builder').innerHTML = '';
    addIngredientRow(); addStepRow(); 
    showScreen('add');
  }

  function editRecipe() {
    editingId = currentRecipe.id;
    showScreen('add');
    document.getElementById('add-title').textContent = "Modifica Ricetta";
    document.getElementById('new-name').value = currentRecipe.name;
    document.getElementById('new-category').value = currentRecipe.category;
    document.getElementById('new-time').value = currentRecipe.time;
    selectEmoji(currentRecipe.emoji);
    currentImage = currentRecipe.image; displayPreview(currentImage);
    
    document.getElementById('ingredients-builder').innerHTML = '';
    currentRecipe.ingredients.forEach(ing => {
      addIngredientRow(); let id = ingCount;
      document.getElementById('ing-n-'+id).value = ing.name;
      document.getElementById('ing-q-'+id).value = ing.qty;
    });
    document.getElementById('steps-builder').innerHTML = '';
    currentRecipe.steps.forEach(s => {
      addStepRow(); document.getElementById('step-t-'+stepCount).value = s;
    });
  }

  function addIngredientRow() {
    ingCount++;
    const html = `<div class="ing-row" id="ing-row-${ingCount}">
      <input type="text" id="ing-n-${ingCount}" class="form-input" placeholder="Cosa">
      <input type="text" id="ing-q-${ingCount}" class="form-input qty" placeholder="Qtà">
      <button onclick="this.parentElement.remove()" class="remove-btn">✕</button></div>`;
    document.getElementById('ingredients-builder').insertAdjacentHTML('beforeend', html);
  }

  function addStepRow() {
    stepCount++;
    const html = `<div class="step-row" id="step-row-${stepCount}">
      <input type="text" id="step-t-${stepCount}" class="form-input" placeholder="Descrivi...">
      <button onclick="this.parentElement.remove()" class="remove-btn">✕</button></div>`;
    document.getElementById('steps-builder').insertAdjacentHTML('beforeend', html);
  }

  function saveRecipe() {
    const name = document.getElementById('new-name').value.trim();
    if(!name) return toast("⚠️ Inserisci il nome");
    
    const ingredients = [];
    document.querySelectorAll('.ing-row').forEach(row => {
      const id = row.id.split('-')[2];
      const n = document.getElementById('ing-n-'+id).value.trim();
      const q = document.getElementById('ing-q-'+id).value.trim();
      if(n) {
        const m = q.match(/^([\d.,]+)\s*(.*)/);
        ingredients.push({name:n, qty:q, baseQty: m ? parseFloat(m[1].replace(',','.')) : null, unit: m ? m[2].trim() : ''});
      }
    });

    const steps = Array.from(document.querySelectorAll('.step-row input')).map(i => i.value.trim()).filter(v => v);
    if(ingredients.length === 0 || steps.length === 0) return toast("⚠️ Inserisci ingredienti e passaggi");

    const data = { 
      id: editingId || Date.now(), 
      name, image: currentImage, emoji: selectedEmoji, ingredients, steps, 
      category: document.getElementById('new-category').value, 
      time: parseInt(document.getElementById('new-time').value) || 30,
      fav: editingId ? currentRecipe.fav : false, portions: 4,
      notes: editingId ? currentRecipe.notes : ''
    };

    if(editingId) recipes = recipes.map(r => r.id === editingId ? data : r);
    else recipes.unshift(data);
    
    save(); toast("✅ Ricetta salvata!"); showScreen('home');
  }

  // BACKUP
  function exportBackup() {
    const blob = new Blob([JSON.stringify(recipes)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `backup_ricette_${new Date().toISOString().slice(0,10)}.json`; a.click();
  }

  function importBackup(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if(confirm(`Importare ${imported.length} ricette? Sovrascriverà quelle attuali.`)) {
          recipes = imported; save(); location.reload();
        }
      } catch(err) { toast("❌ File non valido"); }
    };
    if(input.files[0]) reader.readAsDataURL(input.files[0]);
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  init();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registrato!"))
      .catch(err => console.log("Errore SW:", err));
  }
</script>
